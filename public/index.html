<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EcoMind — Carbon Footprint Tracker</title>
    <meta
      name="description"
      content="Track your carbon footprint and get AI-powered tips to reduce it."
    />
    <link rel="icon" type="image/svg+xml" href="./assets/favicon.svg" />
    <link rel="icon" type="image/png" href="./assets/logo.png" />
    <link rel="apple-touch-icon" href="./assets/logo.png" />
    <meta name="theme-color" content="#1a2118" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"
    />
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#app-main">Skip to content</a>
    <div id="app">
      <!-- ── Header + tab navigation ─────────────────────────── -->
      <header id="app-header">
        <div class="brand">
          <img
            class="brand-logo"
            src="./assets/logo.png"
            alt="EcoMind logo"
            onerror="this.onerror=null;this.src='./assets/favicon.svg'"
          />
          <span class="brand-name">EcoMind</span>
        </div>
        <nav id="tab-nav" role="tablist" aria-label="Primary">
          <button class="tab-btn active" role="tab" id="tab-btn-dashboard" data-tab="dashboard" aria-controls="tab-dashboard" aria-selected="true" tabindex="0">
            <i class="ti ti-layout-dashboard" aria-hidden="true"></i><span>Dashboard</span>
          </button>
          <button class="tab-btn" role="tab" id="tab-btn-log" data-tab="log" aria-controls="tab-log" aria-selected="false" tabindex="-1">
            <i class="ti ti-circle-plus" aria-hidden="true"></i><span>Log</span>
          </button>
          <button class="tab-btn" role="tab" id="tab-btn-insights" data-tab="insights" aria-controls="tab-insights" aria-selected="false" tabindex="-1">
            <i class="ti ti-chart-bar" aria-hidden="true"></i><span>Insights</span>
          </button>
          <button class="tab-btn" role="tab" id="tab-btn-coach" data-tab="coach" aria-controls="tab-coach" aria-selected="false" tabindex="-1">
            <i class="ti ti-message-chatbot" aria-hidden="true"></i><span>Coach</span>
          </button>
          <button class="tab-btn" role="tab" id="tab-btn-settings" data-tab="settings" aria-controls="tab-settings" aria-selected="false" tabindex="-1">
            <i class="ti ti-settings" aria-hidden="true"></i><span>Settings</span>
          </button>
        </nav>
      </header>

      <!-- ── Tab panels ──────────────────────────────────────── -->
      <main id="app-main" tabindex="-1">
        <section id="tab-dashboard" class="tab-panel" role="tabpanel" tabindex="0" aria-labelledby="tab-btn-dashboard"></section>
        <section id="tab-log" class="tab-panel hidden" role="tabpanel" tabindex="0" aria-labelledby="tab-btn-log"></section>
        <section id="tab-insights" class="tab-panel hidden" role="tabpanel" tabindex="0" aria-labelledby="tab-btn-insights"></section>
        <section id="tab-coach" class="tab-panel hidden" role="tabpanel" tabindex="0" aria-labelledby="tab-btn-coach"></section>
        <section id="tab-settings" class="tab-panel hidden" role="tabpanel" tabindex="0" aria-labelledby="tab-btn-settings"></section>
      </main>

      <!-- ── Toast container ─────────────────────────────────── -->
      <div id="toast-container">
        <div id="toast-polite" role="status" aria-live="polite"></div>
        <div id="toast-assertive" role="alert" aria-live="assertive"></div>
      </div>
    </div>

    <!-- ── Onboarding modal ──────────────────────────────────── -->
    <div id="onboarding-overlay" class="hidden"></div>

    <script type="module" src="./js/app.js"></script>
  </body>
</html>
